<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NO DRONE ZONE - Connexion</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2f4858 0%, #1a1a2e 50%, #324a70 100%);
      position: relative;
      overflow: hidden;
    }

    /* Animated background circles */
    body::before,
    body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: float 20s infinite ease-in-out;
    }

    body::before {
      width: 400px;
      height: 400px;
      background: #b70028;
      top: -200px;
      left: -200px;
      animation-delay: 0s;
    }

    body::after {
      width: 500px;
      height: 500px;
      background: #823276;
      bottom: -250px;
      right: -250px;
      animation-delay: 10s;
    }

    @keyframes float {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      25% {
        transform: translate(50px, -50px) scale(1.1);
      }
      50% {
        transform: translate(-30px, 30px) scale(0.9);
      }
      75% {
        transform: translate(30px, 50px) scale(1.05);
      }
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      margin: 20px;
      animation: slideUp 0.6s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-card {
      background: rgba(47, 72, 88, 0.4);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo h1 {
      color: #ffffff;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 8px;
      text-shadow: 2px 2px 10px rgba(183, 0, 40, 0.5);
    }

    .logo p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 1px;
    }

    .divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, #b70028, transparent);
      margin: 32px 0;
      opacity: 0.5;
    }

    .form-group {
      margin-bottom: 24px;
      position: relative;
    }

    label {
      display: block;
      color: rgba(255, 255, 255, 0.8);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #ffffff;
      font-size: 15px;
      transition: all 0.3s ease;
      outline: none;
    }

    input:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: #b70028;
      box-shadow: 0 0 0 4px rgba(183, 0, 40, 0.15);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .forgot-password {
      text-align: right;
      margin-top: -16px;
      margin-bottom: 24px;
    }

    .forgot-password a {
      color: rgba(255, 255, 255, 0.6);
      font-size: 13px;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .forgot-password a:hover {
      color: #b70028;
    }

    .btn-login {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #b70028 0%, #a71057 100%);
      border: none;
      border-radius: 12px;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(183, 0, 40, 0.3);
      position: relative;
      overflow: hidden;
    }

    .btn-login::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .btn-login:hover::before {
      left: 100%;
    }

    .btn-login:hover {
      background: linear-gradient(135deg, #a71057 0%, #823276 100%);
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(183, 0, 40, 0.5);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .register-link {
      text-align: center;
      margin-top: 32px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
    }

    .register-link a {
      color: #ffffff;
      font-weight: 600;
      text-decoration: none;
      transition: color 0.3s ease;
      position: relative;
    }

    .register-link a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: #b70028;
      transition: width 0.3s ease;
    }

    .register-link a:hover {
      color: #b70028;
    }

    .register-link a:hover::after {
      width: 100%;
    }

    .or-divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 32px 0;
      color: rgba(255, 255, 255, 0.4);
      font-size: 13px;
    }

    .or-divider::before,
    .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }

    .or-divider span {
      padding: 0 16px;
    }

    .social-login {
      display: flex;
      gap: 12px;
    }

    .btn-social {
      flex: 1;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #ffffff;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-social:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 40px 28px;
      }

      .logo h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <h1>NO DRONE ZONE</h1>
        <p>Gestion des zones aériennes</p>
      </div>

      <div class="divider"></div>

      <form>
        <div class="form-group">
          <label for="email">Email</label>
          <input 
            type="email" 
            id="email" 
            placeholder="votre@email.com"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input 
            type="password" 
            id="password" 
            placeholder="••••••••"
            required
          />
        </div>

        <div class="forgot-password">
          <a href="#">Mot de passe oublié ?</a>
        </div>

        <button type="submit" class="btn-login" >
          Connexion
        </button>
      </form>
    </div>
  </div>
</body>
</html>
